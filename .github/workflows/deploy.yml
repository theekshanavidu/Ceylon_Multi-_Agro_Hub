name: Deploy React App to gh-pages branch

on:
  push:
    branches: ["main"] # When you push to main branch, this runs
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a commit and push to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to gh-pages branch
        # This action takes the 'dist' folder and pushes it to the 'gh-pages' branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
